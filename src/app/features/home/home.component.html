<header class="shrink-0 pt-safe p-4 border-b border-white/20 bg-surface z-20">
    <div class="flex items-center justify-between mb-4">
        <div (mousedown)="startAdminPress()" (mouseup)="cancelAdminPress()"
             (touchstart)="startAdminPress()" (touchend)="cancelAdminPress()"
             class="p-2 rounded-xl active:scale-95 transition-transform">
            <h1 class="text-3xl font-bold text-primary tracking-wide">IndoorNav</h1>
        </div>
    </div>
    
    <div class="bg-primary/20 border border-primary/50 rounded-xl p-4 flex items-center gap-4">
        <span class="material-symbols-rounded text-primary text-4xl">my_location</span>
        <div>
            <p class="text-xs text-primary font-bold uppercase">Estás en:</p>
            <p class="text-xl font-extrabold text-white">Entrada Principal</p>
        </div>
    </div>
</header>

<main class="flex-1 overflow-y-auto px-4 py-6 space-y-4">
    <h2 class="text-contrast text-lg font-bold uppercase tracking-widest px-2 mb-2">
        ¿A dónde quieres ir?
    </h2>

    @for (cat of categories; track cat) {
        <div (click)="handleInteraction(cat)"
             [class.ring-4]="currentFocus === cat"
             [class.ring-contrast]="currentFocus === cat"
             class="w-full bg-surface border-l-8 border-primary rounded-r-xl p-6 flex items-center justify-between shadow-lg mb-4 transition-all duration-200">
            
            <div class="flex items-center gap-4">
                <span class="material-symbols-rounded text-5xl text-primary">explore</span>
                <div class="text-left">
                    <span class="block text-3xl font-black text-white mb-1 capitalize">{{ cat }}</span>
                    <span class="block text-sm text-gray-400 font-medium">Toca para ver destinos</span>
                </div>
            </div>
            <span class="material-symbols-rounded text-5xl text-white">chevron_right</span>
        </div>
    }

    @if (categories.length === 0) {
        <div class="text-center mt-10 p-6 border-2 border-dashed border-gray-600 rounded-xl">
            <span class="material-symbols-rounded text-4xl text-gray-500 mb-2">route</span>
            <p class="text-gray-400 font-medium">No hay rutas configuradas en el edificio.</p>
        </div>
    }
</main>
